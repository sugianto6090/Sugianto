name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build web app
        run: |
          npm run build
          mkdir -p dist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Check environment
        run: |
          node -v
          npm -v
          java -version
          gradle -v

      - name: Fix Gradle Wrapper & Sync
        run: |
          cd android
          # Use the gradle version we just set up to fix the wrapper
          gradle wrapper
          chmod +x gradlew
          ./gradlew --version
          cd ..
          npx cap sync android

      - name: Build Android
        run: |
          cd android
          # Use ./gradlew clean to ensure a fresh build state
          ./gradlew clean
          ./gradlew assembleDebug
          ./gradlew bundleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
